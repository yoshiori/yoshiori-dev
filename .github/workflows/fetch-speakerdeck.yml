name: Fetch SpeakerDeck Talks

on:
  schedule:
    - cron: '0 0 * * 0'   # Every Sunday at 00:00 UTC
  workflow_dispatch:       # Allow manual trigger

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch talks from SpeakerDeck RSS
        run: python scripts/fetch_speakerdeck.py

      - name: Create PR if talks changed
        run: |
          git diff --quiet src/content/talks.json && exit 0
          BRANCH="chore/update-speakerdeck-$(date +%Y%m%d)"
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git checkout -b "$BRANCH"
          git add src/content/talks.json
          git commit -m "chore: update SpeakerDeck talks"
          git push -u origin "$BRANCH"
          gh pr create \
            --title "chore: update SpeakerDeck talks" \
            --body "Automated update from SpeakerDeck RSS feed." \
            --base main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
