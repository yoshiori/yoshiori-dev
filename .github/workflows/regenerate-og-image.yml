name: Regenerate OG Image

on:
  push:
    branches: [main]
    paths: ['src/content/site.json']
  workflow_dispatch:       # Allow manual trigger

jobs:
  regenerate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install Pillow

      - name: Generate OG image
        run: python scripts/generate_og_image.py

      - name: Create PR if image changed
        run: |
          git diff --quiet public/og-image.png && exit 0
          BRANCH="chore/regenerate-og-image-$(date +%Y%m%d)"
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git checkout -b "$BRANCH"
          git add public/og-image.png
          git commit -m "chore: regenerate OG image"
          git push -u origin "$BRANCH"
          gh pr create \
            --title "chore: regenerate OG image" \
            --body "Automated regeneration triggered by site.json update." \
            --base main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
